<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connected</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'IBM Plex Sans', sans-serif;
        background: #0a0a0a;
        color: #e8e8e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        max-width: 560px;
        width: 100%;
      }

      .status-line {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 2.5rem;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .status-text {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px;
        color: #4ade80;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 300;
        line-height: 1.15;
        letter-spacing: -0.02em;
        margin-bottom: 1.5rem;
        color: #f5f5ef;
      }

      h1 span {
        color: #4ade80;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #333;
        margin-bottom: 1.5rem;
      }

      p {
        font-size: 15px;
        line-height: 1.75;
        color: #888;
        font-weight: 300;
        margin-bottom: 2.5rem;
      }

      .meta {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        color: #444;
        letter-spacing: 0.05em;
        border-top: 1px solid #1a1a1a;
        padding-top: 1.5rem;
        display: flex;
        gap: 2rem;
      }

      .meta span { color: #666; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="status-line">
        <div class="dot"></div>
        <span class="status-text">Service running</span>
      </div>

      <h1>App <span>connected</span><br>successfully.</h1>

      <div class="divider"></div>

      <p>
        The Django application is live and responding correctly.
        The containerized service is up and reachable.
      </p>

      <div class="meta">
        <div>FRAMEWORK<br><span>Django</span></div>
        <div>RUNTIME<br><span>Docker</span></div>
        <div>STATUS<br><span>200 OK</span></div>
      </div>
    </div>
  </body>
</html>
